<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | Skilora Tunisia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card-bg: #111113;
            --gold: #c9a84c;
            --gold-light: #d4b86a;
            --text: #fafafa;
            --text-muted: #71717a;
            --text-subtle: #3f3f46;
            --border: #27272a;
            --success: #10b981;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .page-wrapper {
            width: 100%;
            max-width: 860px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Verification badge ── */
        .verification-status {
            text-align: center;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
        }
        .badge svg { width: 16px; height: 16px; }

        /* ── Certificate card (mirrors the JavaFX renderer) ── */
        .certificate {
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 48px 56px 36px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 60px rgba(201, 168, 76, 0.08);
        }

        @media (max-width: 640px) {
            .certificate { padding: 32px 24px 28px; }
        }

        .ornamental-line {
            width: 200px;
            height: 1px;
            background: var(--gold);
            opacity: 0.4;
            margin: 0 auto 20px;
        }

        .cert-emblem {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--gold-light);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .cert-header {
            font-size: 11px;
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .cert-certifies {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .cert-name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        .cert-separator {
            width: 300px;
            height: 1px;
            background: var(--border);
            margin: 0 auto 12px;
        }

        .cert-completed-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .cert-formation {
            font-size: 20px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 24px;
        }

        /* ── Signatures ── */
        .signatures {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 20px;
        }

        .sig-block { text-align: center; min-width: 140px; }

        .sig-image-wrap {
            margin: 0 auto 6px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sig-image-wrap img { display: block; }

        .sig-line {
            width: 140px;
            height: 1px;
            background: var(--text-subtle);
            margin: 0 auto 6px;
        }

        .sig-name {
            font-size: 11px;
            font-weight: 600;
            color: #d4d4d8;
        }

        .sig-title {
            font-size: 9px;
            color: var(--text-muted);
        }

        /* ── Meta info ── */
        .cert-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .cert-number {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 10px;
            color: var(--text-subtle);
            margin-bottom: 4px;
        }

        .cert-hash {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 9px;
            color: var(--border);
        }

        .ornamental-line-bottom {
            width: 200px;
            height: 1px;
            background: var(--gold);
            opacity: 0.4;
            margin: 16px auto 0;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .footer a { color: var(--gold); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        .powered-by {
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-subtle);
            letter-spacing: 1px;
        }

        /* Error state */
        .certificate.invalid { border-color: var(--error); }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="verification-status">
            <div class="badge" id="badge">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="badge-text">Verified Certificate</span>
            </div>
        </div>

        <div class="certificate" id="certificate">
            <div class="ornamental-line"></div>
            <div class="cert-emblem">✦ SKILORA ✦</div>
            <div class="cert-header">CERTIFICATE OF COMPLETION</div>

            <div class="cert-certifies">This certifies that</div>
            <div class="cert-name" id="holder-name">...</div>
            <div class="cert-separator"></div>
            <div class="cert-completed-text">has successfully completed the formation</div>
            <div class="cert-formation" id="training-title">...</div>

            <div class="signatures" id="signatures-row">
                <div class="sig-block" id="director-sig-block">
                    <div class="sig-line" id="director-sig-line"></div>
                    <div class="sig-image-wrap" id="director-sig-image-wrap" style="display: none;"><img id="director-sig-img" alt="Director signature" style="max-width: 140px; max-height: 56px; object-fit: contain;"></div>
                    <div class="sig-name" id="director-sig-name">Director</div>
                    <div class="sig-title">Formation Director</div>
                </div>
                <div class="sig-block">
                    <div class="sig-line"></div>
                    <div class="sig-name">Skilora</div>
                    <div class="sig-title">Platform</div>
                </div>
            </div>

            <div class="cert-date" id="completion-date">...</div>
            <div class="cert-number" id="cert-id">...</div>
            <div class="cert-hash" id="cert-hash"></div>
            <div class="ornamental-line-bottom"></div>
        </div>

        <div class="footer">
            This certificate has been verified as authentic by Skilora Tunisia.
            <div class="powered-by">SKILORA TUNISIA — Certificate Verification</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pathParts = window.location.pathname.split('/').filter(p => p.length > 0);
            let certificateId = null;
            let isTokenFormat = false;

            const certificateIndex = pathParts.indexOf('certificate');
            if (certificateIndex >= 0 && certificateIndex < pathParts.length - 1) {
                certificateId = pathParts[pathParts.length - 1];
                isTokenFormat = true;
            } else if (pathParts.length > 0) {
                certificateId = pathParts[pathParts.length - 1];
            }

            if (certificateId && certificateId !== 'verification_page.html') {
                let apiUrl = isTokenFormat
                    ? window.location.origin + '/api/verify/token/' + certificateId
                    : window.location.origin + '/api/verify/' + certificateId;

                fetch(apiUrl)
                    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                    .then(data => {
                        if (data.status === 'valid') {
                            document.getElementById('holder-name').textContent = data.holderName;
                            document.getElementById('training-title').textContent = data.trainingTitle;
                            document.getElementById('completion-date').textContent = 'Issued: ' + data.completionDate;
                            document.getElementById('cert-id').textContent = 'Certificate No: ' + data.certId;
                            if (data.directorSignature) {
                                const wrap = document.getElementById('director-sig-image-wrap');
                                const img = document.getElementById('director-sig-img');
                                const line = document.getElementById('director-sig-line');
                                const nameLabel = document.getElementById('director-sig-name');
                                if (wrap && img) {
                                    wrap.style.display = 'block';
                                    if (line) line.style.display = 'none';
                                    if (nameLabel) nameLabel.style.display = 'none';
                                    img.onerror = function() {
                                        wrap.style.display = 'none';
                                        if (line) line.style.display = 'block';
                                        if (nameLabel) nameLabel.style.display = 'block';
                                    };
                                    img.src = 'data:image/png;base64,' + data.directorSignature;
                                }
                            }
                        } else {
                            handleInvalid(data.message || 'Invalid Certificate');
                        }
                    })
                    .catch(err => {
                        console.error('Verification error:', err);
                        handleInvalid('Connection Error');
                    });
            } else {
                handleInvalid('Missing Certificate ID');
            }

            function handleInvalid(reason) {
                const badge = document.getElementById('badge');
                badge.style.background = 'rgba(239, 68, 68, 0.08)';
                badge.style.color = '#ef4444';
                badge.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                badge.querySelector('svg path').setAttribute('d', 'M6 18L18 6M6 6l12 12');
                document.getElementById('badge-text').textContent = reason;
                document.getElementById('certificate').classList.add('invalid');
                document.getElementById('holder-name').textContent = '—';
                document.getElementById('training-title').textContent = '—';
                document.getElementById('completion-date').textContent = '—';
                document.getElementById('cert-id').textContent = '—';
                document.querySelector('.footer').textContent =
                    'This certificate could not be verified. Please contact Skilora support.';
            }
        });
    </script>
</body>

</html>
