# Application Settings
# Set to LOCAL to use your WiFi IP (for development/LAN testing).
# Set to your real domain (e.g. https://skilora.tn) when deployed to production.
app.url.base=LOCAL
app.verification.path=/verify/certificate/
app.server.port=8080

# Public Verification URL (for QR codes accessible from anywhere)
# If set, QR codes will use this URL instead of local IP (works from any network)
# Leave empty to use local IP (requires same WiFi network)
# Example: app.verification.public.url=https://skilora.tn/verify/
# Example: app.verification.public.url=https://verify.skilora.tn/
app.verification.public.url=

# Groq API Configuration (Free AI API)
# Get your free API key at: https://console.groq.com/keys
# Add your Groq API key here (or set GROQ_API_KEY environment variable)
# Example: groq.api.key=gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
groq.api.key=your_groq_api_key_here