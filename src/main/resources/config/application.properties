# ═══════════════════════════════════════════════════════════════
# Skilora Tunisia — Application Configuration (fallback defaults)
# ═══════════════════════════════════════════════════════════════
# Values here are OVERRIDDEN by environment variables and .env.
# Use EnvConfig.get("key") in code to resolve the correct value.
# ═══════════════════════════════════════════════════════════════

# ── Stripe (Finance Module — Payment Processing) ──
stripe.secret.key=
stripe.public.key=

# ── Twilio (WhatsApp / SMS Notifications) ──
twilio.account.sid=
twilio.auth.token=
twilio.from.number=
twilio.to.number=

# ── Google Gemini AI (Support AI Responses, Community Summarization) ──
gemini.api.key=
gemini.model=gemini-2.0-flash

# ── OpenAI (Finance Chatbot) ──
openai.api.key=

# ── Cloudinary (Community Media Uploads) ──
cloudinary.cloud.name=
cloudinary.upload.preset=
cloudinary.api.key=
cloudinary.api.secret=

# ── Deepgram (Support Speech-to-Text) ──
deepgram.api.key=
deepgram.model=nova-2
